spring:
  application:
    name: sports-manager
  # Database configuration - Supabase PostgreSQL
  datasource:
    url: jdbc:postgresql://db.avtmdjyliuqqoouqzhpo.supabase.co:5432/postgres
    username: postgres
    password: ${SUPABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  
  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  
  # Email configuration (will be configured with environment variables)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Security configuration
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN

# Logging configuration
logging:
  level:
    com.pds.sportsmanager: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

