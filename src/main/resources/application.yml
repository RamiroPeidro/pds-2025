spring:
  application:
    name: sports-manager
  # Database configuration - Supabase PostgreSQL (Supavisor Session Mode)
  datasource:
    url: jdbc:postgresql://aws-0-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0
    username: postgres.avtmdjyliuqqoouqzhpo
    password: ${SUPABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 60000
      validation-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 900000
      minimum-idle: 1
      maximum-pool-size: 5
  
  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  
  # Email configuration (will be configured with environment variables)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Security configuration - Disabled for development
  # security:
  #   user:
  #     name: admin
  #     password: admin123
  #     roles: ADMIN

# Management and Actuator configuration
management:
  health:
    mail:
      enabled: false
  endpoint:
    health:
      show-details: when-authorized

# Logging configuration
logging:
  level:
    com.pds.sportsmanager: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

