spring:
  application:
    name: sports-manager
  profiles:
    active: dev
  
  # Database configuration
  datasource:
    url: jdbc:h2:mem:sportsmanager
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA/Hibernate configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # H2 Console (for development)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # Email configuration (will be configured with environment variables)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Security configuration
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN

# Logging configuration
logging:
  level:
    com.pds.sportsmanager: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Application specific properties
app:
  firebase:
    service-account-key: ${FIREBASE_SERVICE_ACCOUNT_KEY:}
  notification:
    email:
      enabled: true
    firebase:
      enabled: false

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://localhost:3306/sportsmanager
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:sportsmanager}
    password: ${DB_PASSWORD:}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  h2:
    console:
      enabled: false

logging:
  level:
    com.pds.sportsmanager: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN 