spring:
  application:
    name: sports-manager
  profiles:
    active: dev
  
  # Common JPA configuration
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  
  # Email configuration (will be configured with environment variables)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Security configuration
  security:
    user:
      name: admin
      password: admin123
      roles: ADMIN

# Logging configuration
logging:
  level:
    com.pds.sportsmanager: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Application specific properties
app:
  firebase:
    service-account-key: ${FIREBASE_SERVICE_ACCOUNT_KEY:}
  notification:
    email:
      enabled: true
    firebase:
      enabled: false

 